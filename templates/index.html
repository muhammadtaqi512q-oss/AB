<!DOCTYPE html>
<html>
<head>
    <title>Ira AI</title>
    <style>
        body { background: #0a0e17; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 50px; }
        .container { background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 15px; width: 400px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 215, 0, 0.3); }
        input, textarea { width: 100%; margin-bottom: 10px; background: #1a202c; border: 1px solid #4a5568; color: white; padding: 10px; border-radius: 5px; }
        button { background: #d4af37; border: none; padding: 10px 20px; color: black; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Ira AI</h2>
        <textarea id="msg" placeholder="Message..."></textarea>
        <button onclick="send()">Send</button>
        <div id="res" style="margin-top: 20px; color: #d4af37;"></div>
    </div>
    <script>
        async function send() {
            const msg = document.getElementById('msg').value;
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: msg})
            });
            const data = await res.json();
            document.getElementById('res').innerText = data.response;
        }
    </script>
</body>
</html>
